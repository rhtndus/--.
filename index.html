<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수능 합격 플래너 PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg-color: #ffffff; --text-color: #37352f; --gray-light: #f1f1ef; --gray-text: #9b9a97;
    --border-color: #e9e9e7; --accent-color: #eb5757; --sidebar-bg: #f9f9f8; --dday-bg: #fff5f5;
    --modal-bg: #ffffff; --review-color: #f2994a; --star-filled: #ffca28;
    --grass-0: #ebedf0; --grass-1: #9be9a8; --grass-2: #40c463; --grass-3: #30a14e; --grass-4: #216e39;
    --quote-bg: #f7f6f3; --blue-accent: #4a90e2;
  }
  [data-theme="dark"] {
    --bg-color: #191919; --text-color: #e0e0e0; --gray-light: #2d2d2d; --gray-text: #888888;
    --border-color: #333333; --accent-color: #ff7373; --sidebar-bg: #222222; --dday-bg: #3d2b2b; --modal-bg: #2a2a2a;
    --grass-0: #2d333b; --quote-bg: #252525;
  }
  body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; display: flex; justify-content: center; transition: 0.3s; }
  .container { width: 100%; max-width: 700px; padding: 20px 20px 80px; box-sizing: border-box; }

  /* 현재 시간 */
  .clock-area { text-align: center; font-size: 14px; color: var(--gray-text); font-weight: bold; margin-bottom: 15px; font-family: monospace; }

  /* 사이드바 (슬림) */
  .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 99; }
  .overlay.active { opacity: 1; visibility: visible; }
  .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background-color: var(--sidebar-bg); z-index: 100; padding: 20px 15px; transition: 0.3s; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.1); box-sizing: border-box; }
  .sidebar.active { left: 0; }
  .sidebar-menu-btn { width: 100%; padding: 10px; margin-bottom: 6px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; background-color: var(--accent-color); font-size: 13px; }

  /* 헤더 & 명언 */
  .header-area { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
  .dday-badge { display: inline-block; padding: 6px 14px; background-color: var(--dday-bg); color: var(--accent-color); border-radius: 20px; font-weight: 800; font-size: 14px; margin-bottom: 20px; }
  .motivation-quote-box { background-color: var(--quote-bg); border-left: 4px solid var(--accent-color); padding: 16px 20px; margin-bottom: 25px; font-size: 15px; border-radius: 2px 8px 8px 2px; font-style: italic; word-break: keep-all; line-height: 1.5; }

  /* 리스트 그룹화 */
  .category-group { margin-bottom: 25px; }
  .category-header { display: inline-flex; align-items: center; background-color: #111; color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: bold; margin-bottom: 10px; }
  [data-theme="dark"] .category-header { background-color: #333; }
  .task-item { display: flex; align-items: center; padding: 10px 8px; border-bottom: 1px solid var(--gray-light); }
  .task-text { flex: 1; display: flex; align-items: center; gap: 8px; font-size: 15px; }
  .task-text.completed { color: var(--gray-text); text-decoration: line-through; }
  .task-timer-display { font-family: monospace; font-weight: bold; min-width: 70px; text-align: right; margin-right: 10px; }

  /* 모달 */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 200; }
  .modal-overlay.active { display: flex; }
  .modal { background-color: var(--modal-bg); width: 95%; max-width: 550px; border-radius: 16px; padding: 25px; max-height: 85vh; overflow-y: auto; }
  .lec-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); }
  .lec-tab { padding: 10px; cursor: pointer; color: var(--gray-text); font-weight: bold; transition: 0.2s; }
  .lec-tab.active { color: var(--accent-color); border-bottom: 2px solid var(--accent-color); }

  /* 타이머 및 공통 UI */
  .exam-timer-card { background: linear-gradient(135deg, #2c3e50, #34495e); color: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: center;}
  .exam-timer-card.warning { animation: pulse-red 1s infinite; }
  @keyframes pulse-red { 0% { background: #2c3e50; } 50% { background: #eb5757; } 100% { background: #2c3e50; } }
  .exam-time-big { font-size: 40px; font-weight: 900; font-family: monospace; text-align: center; margin: 10px 0; }

  .card-style { background-color: var(--gray-light); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
  .sb-card { background-color: var(--gray-light); border-radius: 8px; padding: 10px; margin-bottom: 10px; }
  .score-input { width: 100%; padding: 6px; border-radius: 6px; border: 1px solid var(--border-color); text-align: center; background: var(--bg-color); color: var(--text-color); box-sizing: border-box; }

  .total-time-card { background-color: var(--dday-bg); border-radius: 12px; padding: 25px; text-align: center; margin-bottom: 25px; border: 2px solid var(--accent-color); }
  .total-time-value { font-size: 42px; font-weight: 900; font-family: monospace; }
  .subject-buttons { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; justify-content: center; }
  .sub-btn { font-size: 12px; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--gray-light); cursor: pointer; color: var(--text-color); }
  .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
  .input-group input, .input-group select { border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; background: var(--bg-color); color: var(--text-color); }
  .add-btn { background-color: var(--accent-color); color: white; border: none; border-radius: 8px; padding: 0 20px; font-weight: bold; cursor: pointer; }
  .grass-container { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-top: 5px; }
  .grass-square { aspect-ratio: 1; border-radius: 2px; background-color: var(--grass-0); }
  
  /* 별점 */
  .star { font-size: 26px; cursor: pointer; color: var(--gray-text); transition: 0.2s; }
  .star:hover { transform: scale(1.1); }
</style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="sidebar" id="sidebar">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
    <b style="font-size:16px;">📊 학습 대시보드</b>
    <button class="close-btn" id="close-sidebar" style="background:none; border:none; font-size:20px; cursor:pointer; color: var(--text-color);">✕</button>
  </div>
  
  <div class="sb-card">
    <div style="font-size:11px; font-weight:bold; margin-bottom:5px; color:var(--gray-text);">🍰 오늘 과목별 비중</div>
    <div style="height: 100px; display:flex; justify-content:center;"><canvas id="balanceChart"></canvas></div>
  </div>
  <div class="sb-card">
    <div style="font-size:11px; font-weight:bold; margin-bottom:2px; color:var(--gray-text);">🌿 최근 4주 잔디</div>
    <div class="grass-container" id="grass-grid"></div>
  </div>
  <div class="sb-card">
    <div style="font-size:11px; font-weight:bold; margin-bottom:5px; color:var(--gray-text);">📈 주간 공부 시간</div>
    <div style="height: 80px;"><canvas id="weeklyChart"></canvas></div>
  </div>

  <button class="sidebar-menu-btn" id="open-lecture-modal">📺 인강 진도표 관리</button>
  <button class="sidebar-menu-btn" id="open-exam-modal" style="background-color: #4a90e2;">📈 모의고사 성적 관리</button>
  <div style="display:flex; gap:6px; margin-top:5px;">
    <button class="sidebar-menu-btn" id="backup-btn" style="flex:1; background-color: #27ae60; margin:0;">💾 백업</button>
    <button class="sidebar-menu-btn" id="restore-btn" style="flex:1; background-color: #f39c12; margin:0;">📂 복구</button>
  </div>
  <input type="file" id="restore-file" style="display:none;" accept=".json">
</div>

<div class="modal-overlay" id="sim-timer-overlay">
  <div class="modal">
    <button style="float:right; background:none; border:none; font-size:24px; cursor:pointer; color:var(--text-color);" onclick="closeModal('sim-timer-overlay')">✕</button>
    <h3>⏲️ 수능 실전 타이머</h3>
    <div class="exam-timer-card" id="exam-card">
      <div id="exam-status" style="font-size:14px; font-weight:bold;">시험 전 대기</div>
      <div class="exam-time-big" id="exam-timer-display">00:00</div>
      <div id="exam-notice" style="font-size:12px; opacity:0.8;">원하는 과목을 선택하세요.</div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
      <button class="sidebar-menu-btn" onclick="startExam(80, '국어')" style="background:#e67e22; padding:12px; margin:0;">국어 (80분)</button>
      <button class="sidebar-menu-btn" onclick="startExam(100, '수학')" style="background:#2980b9; padding:12px; margin:0;">수학 (100분)</button>
      <button class="sidebar-menu-btn" onclick="startExam(70, '영어')" style="background:#27ae60; padding:12px; margin:0;">영어 (70분)</button>
      <button class="sidebar-menu-btn" onclick="startExam(30, '탐구')" style="background:#8e44ad; padding:12px; margin:0;">탐구 (30분)</button>
    </div>
    <button class="sidebar-menu-btn" onclick="stopExam()" style="background:#95a5a6; margin-top:10px; width:100%;">타이머 초기화 종료</button>
  </div>
</div>

<div class="modal-overlay" id="lecture-modal-overlay">
  <div class="modal">
    <button class="close-btn" style="float:right; background:none; border:none; font-size:24px; cursor:pointer; color:var(--text-color);" onclick="closeModal('lecture-modal-overlay')">✕</button>
    <h3>📺 인강 진도표</h3>
    <div class="card-style">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:8px;">
            <select id="lec-category" style="padding:8px; border-radius:5px; border:1px solid var(--border-color); background:var(--bg-color); color:var(--text-color);">
                <option value="국어">국어</option>
                <option value="수학">수학</option>
                <option value="영어">영어</option>
                <option value="사문">사문</option>
                <option value="생윤">생윤</option>
                <option value="기타">기타</option>
            </select>
            <input type="text" id="lec-name" placeholder="강의명" style="padding:8px; border-radius:5px; border:1px solid var(--border-color); background:var(--bg-color); color:var(--text-color);">
        </div>
        <div style="display:flex; gap:8px;">
            <input type="number" id="lec-count" placeholder="총 강수" style="flex:1; padding:8px; border-radius:5px; border:1px solid var(--border-color); background:var(--bg-color); color:var(--text-color);">
            <button id="add-lec-btn" style="padding:8px 20px; background:var(--accent-color); color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">추가</button>
        </div>
    </div>
    <div class="lec-tabs">
        <div class="lec-tab active" id="tab-ongoing" onclick="setLecTab('ongoing')">수강 중</div>
        <div class="lec-tab" id="tab-completed" onclick="setLecTab('completed')">수강 완료 📦</div>
    </div>
    <div id="lecture-list-container"></div>
  </div>
</div>

<div class="modal-overlay" id="exam-modal-overlay">
  <div class="modal">
    <button class="close-btn" style="float:right; background:none; border:none; font-size:24px; cursor:pointer; color:var(--text-color);" onclick="closeModal('exam-modal-overlay')">✕</button>
    <h3>📈 모의고사 성적 관리</h3>
    <div class="card-style"><canvas id="examChart" height="150"></canvas></div>
    
    <div class="card-style">
      <input type="text" id="ex-title" placeholder="시험명 (예: 6월 평가원)" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box; border:1px solid var(--border-color); border-radius:6px; background:var(--bg-color); color:var(--text-color);">
      <table style="width:100%; font-size:13px; text-align:center; border-collapse: collapse; margin-bottom:10px;">
        <tr><th style="padding-bottom:5px;">과목</th><th style="padding-bottom:5px;">표점</th><th style="padding-bottom:5px;">백분위/등급</th></tr>
        <tr><td>국어</td><td><input type="number" id="ex-kor-s" class="score-input"></td><td><input type="number" id="ex-kor-p" class="score-input" placeholder="%"></td></tr>
        <tr><td>수학</td><td><input type="number" id="ex-math-s" class="score-input"></td><td><input type="number" id="ex-math-p" class="score-input" placeholder="%"></td></tr>
        <tr style="background:rgba(74,144,226,0.05)"><td><b>영어</b></td><td>-</td><td><input type="number" id="ex-eng-g" class="score-input" placeholder="등급"></td></tr>
        <tr><td>사문</td><td><input type="number" id="ex-in1-s" class="score-input"></td><td><input type="number" id="ex-in1-p" class="score-input" placeholder="%"></td></tr>
        <tr><td>생윤</td><td><input type="number" id="ex-in2-s" class="score-input"></td><td><input type="number" id="ex-in2-p" class="score-input" placeholder="%"></td></tr>
      </table>
      <input type="text" id="ex-feedback" placeholder="🚨 핵심 패인/피드백 한 줄 (예: 수학 15번 시간 분배 실패)" style="width:100%; padding:10px; box-sizing:border-box; border:1px solid var(--border-color); border-radius:6px; background:var(--bg-color); color:var(--text-color);">
      <button id="add-exam-btn" style="width:100%; padding:12px; margin-top:10px; background:#4a90e2; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">성적 및 피드백 저장</button>
    </div>
    
    <div id="exam-list-container"></div>
  </div>
</div>

<div class="container">
  <div class="clock-area" id="real-time">2026. 00. 00. 00:00:00</div>
  
  <div class="header-area">
    <button id="open-sidebar" style="background:none; border:none; font-size:24px; cursor:pointer; color:var(--text-color);">☰</button>
    <h1 style="margin:0; font-size:26px;">오늘의 플랜</h1>
    <button id="theme-toggle" style="background:none; border:none; font-size:22px; cursor:pointer; margin-left:auto;">🌙</button>
  </div>

  <div class="dday-badge" id="d-day">D-Day 계산 중...</div>
  <div class="motivation-quote-box" id="m-quote">"오늘의 집중이 내일의 결과를 만듭니다."</div>

  <div class="total-time-card">
    <div style="font-size:14px; color:var(--accent-color); font-weight:bold; margin-bottom:8px;">🔥 총 순공 시간</div>
    <div class="total-time-value" id="total-display">00:00:00</div>
    <button onclick="if(document.getElementById('sim-timer-overlay')) document.getElementById('sim-timer-overlay').classList.add('active')" style="margin-top:15px; padding:8px 15px; border-radius:20px; border:none; background:var(--text-color); color:var(--bg-color); font-weight:bold; cursor:pointer; font-size:12px;">⏲️ 수능 실전 모드</button>
  </div>

  <div class="subject-buttons">
    <button class="sub-btn" onclick="addTag('국어')">국어</button>
    <button class="sub-btn" onclick="addTag('수학')">수학</button>
    <button class="sub-btn" onclick="addTag('영어')">영어</button>
    <button class="sub-btn" onclick="addTag('사문')">사문</button>
    <button class="sub-btn" onclick="addTag('생윤')">생윤</button>
    <button class="sub-btn" style="border-color: #f2994a; color: #f2994a;" onclick="addTag('!복습')">!복습</button>
  </div>

  <div class="input-group">
    <input type="text" id="task-input" placeholder="할 일을 입력하세요" autocomplete="off" style="flex:1;">
    <button class="add-btn" id="add-task-btn">추가</button>
  </div>
  
  <button id="carry-over-btn" style="width:100%; padding:10px; border:1px solid var(--border-color); background:var(--gray-light); color:var(--text-color); border-radius:8px; font-weight:bold; margin-bottom:20px; cursor:pointer;">어제 못다 한 일 불러오기 🔄</button>

  <div id="grouped-task-container"></div>

  <div class="card-style" style="margin-top: 30px; text-align:center;">
    <div style="font-size:14px; font-weight:bold; margin-bottom:10px; color:var(--text-color);">🌙 오늘 하루 마무리 피드백</div>
    <div style="margin-bottom: 15px;" id="star-container">
      <span class="star" id="star-1" onclick="setRating(1)">☆</span>
      <span class="star" id="star-2" onclick="setRating(2)">☆</span>
      <span class="star" id="star-3" onclick="setRating(3)">☆</span>
      <span class="star" id="star-4" onclick="setRating(4)">☆</span>
      <span class="star" id="star-5" onclick="setRating(5)">☆</span>
    </div>
    <input type="text" id="daily-diary" placeholder="오늘의 피드백을 한 줄로 남겨주세요." style="width:100%; padding:12px; border-radius:8px; border:1px solid var(--border-color); background:var(--bg-color); color:var(--text-color); box-sizing:border-box;">
  </div>
</div>

<script>
  // 에러 방지용 안전 유틸 함수
  const $ = id => document.getElementById(id);

  let appData = JSON.parse(localStorage.getItem('studyPlannerData')) || {};
  let lectures = JSON.parse(localStorage.getItem('studyLectures')) || [];
  let exams = JSON.parse(localStorage.getItem('studyExams')) || [];
  const getToday = () => new Date().toISOString().split('T')[0];
  let currentKey = getToday();
  let timerIdx = -1, timerInterval = null, weeklyChart = null, balanceChart = null, examChart = null, examCountdown = null;
  let currentLecTab = 'ongoing';
  const categories = ['국어', '수학', '영어', '사문', '생윤', '기타'];

  // 동기부여 명언 40선
  const quotes = [
    "불안함은 네가 잘하고 싶다는 증거야.", "성공은 수천 번의 실패를 거쳐온 결과물이다.", "오늘의 1분이 수능 날 1점을 바꾼다.", 
    "졸음이 올 땐 합격증을 상상해봐.", "지금 자면 꿈을 꾸지만, 지금 공부하면 꿈을 이룬다.", 
    "네가 포기하고 싶은 지금 이 순간이, 남들이 포기하는 순간이다.", "오늘 걷지 않으면 내일은 뛰어야 한다.",
    "후회는 아무리 빨라도 늦다. 지금 당장 시작해라.", "수능은 멘탈 싸움이다. 흔들리지 마라.",
    "핑계를 찾지 말고 방법을 찾아라.", "남들처럼 해서는 남들 이상이 될 수 없다.",
    "네가 헛되이 보낸 오늘은 어제 죽은 이가 그토록 갈망하던 내일이다.", "피할 수 없는 고통이라면 철저하게 즐겨라.",
    "기적은 노력의 또 다른 이름일 뿐이다.", "한계를 설정하는 순간 진짜 한계가 된다."
  ];

  function format(s) { const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60; return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`; }

  // [초기 설정 및 렌더링 시작]
  function init() {
    // 안전한 데이터 초기화
    if(!appData[currentKey]) appData[currentKey] = { tasks: [], rating: 0, diary: "" };
    if(!appData[currentKey].tasks) appData[currentKey].tasks = [];
    
    updateClock();
    setInterval(updateClock, 1000);
    updateDDay();
    renderGroupedTasks();
    updateTot();
    renderReflection();
    
    if($('m-quote')) $('m-quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];
  }

  // 실시간 시계
  function updateClock() {
    const now = new Date();
    if($('real-time')) {
      $('real-time').innerText = `${now.getFullYear()}. ${String(now.getMonth()+1).padStart(2,'0')}. ${String(now.getDate()).padStart(2,'0')}. ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    }
  }

  // 디데이 렌더링 (6모 + 수능)
  function updateDDay() {
    const today = new Date(); today.setHours(0,0,0,0);
    const juneMockDate = new Date(2026, 5, 4); // 6월 4일 (0-index라서 5)
    const suneungDate = new Date(2026, 10, 19); 
    const dJune = Math.ceil((juneMockDate - today) / (1000 * 60 * 60 * 24)); 
    const dSuneung = Math.ceil((suneungDate - today) / (1000 * 60 * 60 * 24));
    
    const formatDDay = (d) => d === 0 ? "D-Day" : (d > 0 ? `D-${d}` : `D+${Math.abs(d)}`);
    if($('d-day')) $('d-day').innerHTML = `🔥 <b>6평 ${formatDDay(dJune)} &nbsp;|&nbsp; 2027 수능 ${formatDDay(dSuneung)}</b>`;
  }

  // 하루 마무리 피드백
  function renderReflection() {
    const rating = appData[currentKey]?.rating || 0;
    const diary = appData[currentKey]?.diary || "";
    if($('daily-diary')) $('daily-diary').value = diary;
    window.setRating(rating, false);
  }
  
  window.setRating = (rating, saveRequired = true) => {
    if(appData[currentKey]) appData[currentKey].rating = rating;
    for(let i=1; i<=5; i++) {
        const starEl = $(`star-${i}`);
        if(starEl) {
            starEl.innerText = i <= rating ? '★' : '☆';
            starEl.style.color = i <= rating ? 'var(--star-filled)' : 'var(--gray-text)';
        }
    }
    if(saveRequired) save();
  };
  
  if($('daily-diary')) {
      $('daily-diary').onchange = (e) => { 
          if(appData[currentKey]) appData[currentKey].diary = e.target.value; 
          save(); 
      };
  }

  // 어제 못다 한 일 불러오기
  if($('carry-over-btn')) {
      $('carry-over-btn').onclick = () => {
          const yesterday = new Date();
          yesterday.setDate(yesterday.getDate() - 1);
          const yKey = yesterday.toISOString().split('T')[0];
          
          if(appData[yKey] && appData[yKey].tasks) {
              const uncompleted = appData[yKey].tasks.filter(t => !t.completed);
              if(uncompleted.length === 0) { alert('어제 남긴 할 일이 없습니다! 완벽해요 👏'); return; }
              uncompleted.forEach(t => {
                  appData[currentKey].tasks.push({ fullText: t.fullText, text: t.text, time: 0, completed: false, review: t.review });
              });
              save(); renderGroupedTasks(); alert(`${uncompleted.length}개의 할 일을 내일로 무사히 가져왔습니다.`);
          } else {
              alert('어제 기록된 할 일이 없습니다.');
          }
      };
  }

  // 실전 모드 타이머
  function startExam(mins, name) {
    stopExam();
    let timeLeft = mins * 60;
    if($('exam-status')) $('exam-status').innerText = `${name} 시험 진행 중`;
    if($('exam-card')) $('exam-card').classList.remove('warning');
    if($('exam-notice')) $('exam-notice').innerText = "집중하세요!";
    
    examCountdown = setInterval(() => {
      timeLeft--;
      const m = Math.floor(timeLeft / 60); const s = timeLeft % 60;
      if($('exam-timer-display')) $('exam-timer-display').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      if(m === 10 && s === 0) { alert('종료 10분 전입니다! 마킹을 확인하세요.'); if($('exam-card')) $('exam-card').classList.add('warning'); }
      if(m === 5 && s === 0) { if($('exam-notice')) $('exam-notice').innerText = "라스트 스퍼트! 포기하지 마세요."; }
      if(timeLeft <= 0) { stopExam(); alert(`${name} 시험이 종료되었습니다! 수고하셨습니다.`); }
    }, 1000);
  }
  function stopExam() { 
      clearInterval(examCountdown); 
      if($('exam-timer-display')) $('exam-timer-display').innerText = "00:00"; 
      if($('exam-status')) $('exam-status').innerText = "시험 전 대기"; 
      if($('exam-notice')) $('exam-notice').innerText = "원하는 과목을 선택하세요."; 
      if($('exam-card')) $('exam-card').classList.remove('warning'); 
  }

  // 사이드바 & 모달 이벤트
  if($('open-sidebar')) {
      $('open-sidebar').onclick = () => { 
          if($('sidebar')) $('sidebar').classList.add('active'); 
          if($('overlay')) $('overlay').classList.add('active'); 
          drawGrass(); drawBalance(); drawWeekly(); 
      };
  }
  if($('close-sidebar')) {
      $('close-sidebar').onclick = () => { 
          if($('sidebar')) $('sidebar').classList.remove('active'); 
          if($('overlay')) $('overlay').classList.remove('active'); 
      };
  }
  if($('overlay')) $('overlay').onclick = () => { if($('sidebar')) $('sidebar').classList.remove('active'); if($('overlay')) $('overlay').classList.remove('active'); };

  if($('open-lecture-modal')) $('open-lecture-modal').onclick = () => { if($('lecture-modal-overlay')) $('lecture-modal-overlay').classList.add('active'); renderLectures(); };
  if($('open-exam-modal')) $('open-exam-modal').onclick = () => { if($('exam-modal-overlay')) $('exam-modal-overlay').classList.add('active'); renderExams(); };
  window.closeModal = (id) => { if($(id)) $(id).classList.remove('active'); };

  function addTag(tag) {
    const input = $('task-input');
    if(!input) return;
    if (tag === '!복습') { if (!input.value.includes('!복습')) input.value = '!복습 ' + input.value; } else { input.value = tag + ' ' + input.value; }
    input.focus();
  }

  if($('add-task-btn')) {
      $('add-task-btn').onclick = () => {
        const inputEl = $('task-input');
        if(!inputEl) return;
        let v = inputEl.value.trim(); if(!v) return;
        const isReview = v.includes('!복습');
        let cleanText = v.replace('!복습', '').trim();
        categories.forEach(c => { cleanText = cleanText.replace(c, '').trim(); });
        
        if(!appData[currentKey]) appData[currentKey] = { tasks: [] };
        if(!appData[currentKey].tasks) appData[currentKey].tasks = [];
        appData[currentKey].tasks.push({ fullText: v, text: cleanText || v, time: 0, completed: false, review: isReview });
        
        inputEl.value = ''; save(); renderGroupedTasks();
      };
  }

  function renderGroupedTasks() {
    const container = $('grouped-task-container'); 
    if(!container) return;
    container.innerHTML = '';
    const tasks = appData[currentKey]?.tasks || [];
    
    categories.forEach(cat => {
      const catTasks = tasks.filter(t => cat === '기타' ? !categories.some(c => c !== '기타' && t.fullText.includes(c)) : t.fullText.includes(cat));
      if (catTasks.length > 0) {
        const groupDiv = document.createElement('div'); groupDiv.className = 'category-group';
        groupDiv.innerHTML = `<div class="category-header">🏷️ ${cat}</div><ul style="list-style:none;padding:0;margin:0;" class="task-list"></ul>`;
        const list = groupDiv.querySelector('ul');
        catTasks.forEach(t => {
          const originalIdx = tasks.indexOf(t);
          const li = document.createElement('li'); li.className = 'task-item';
          const isRun = (timerIdx === originalIdx);
          li.innerHTML = `
            <input type="checkbox" ${t.completed ? 'checked' : ''} style="margin-right:12px; width:18px; height:18px; accent-color:var(--accent-color);">
            <span class="task-text ${t.completed ? 'completed' : ''}">
              ${t.review ? '<span style="font-size:10px; background:#f2994a; color:white; padding:3px 6px; border-radius:4px; margin-right:6px;">복습</span>' : ''}
              ${t.text}
            </span>
            <span class="task-timer-display" id="t-${originalIdx}">${format(t.time || 0)}</span>
            <button class="task-play-btn ${isRun ? 'running' : ''}" style="background:none;border:none;cursor:pointer;font-size:22px; color: ${isRun ? 'var(--accent-color)' : 'var(--gray-text)'}">${isRun ? '⏸️' : '▶️'}</button>
            <button class="del-btn" style="background:none;border:none;cursor:pointer;color:var(--gray-text);font-size:18px;margin-left:5px;">✕</button>
          `;
          li.querySelector('input').onchange = (e) => { t.completed = e.target.checked; if(t.completed && timerIdx === originalIdx) stopTimer(); save(); renderGroupedTasks(); };
          li.querySelector('.task-play-btn').onclick = () => { if(!t.completed) timerIdx === originalIdx ? stopTimer() : startTimer(originalIdx); };
          li.querySelector('.del-btn').onclick = () => { if(timerIdx === originalIdx) stopTimer(); appData[currentKey].tasks.splice(originalIdx, 1); save(); renderGroupedTasks(); updateTot(); };
          list.appendChild(li);
        });
        container.appendChild(groupDiv);
      }
    });
  }

  function startTimer(i) {
    if(timerInterval) clearInterval(timerInterval);
    timerIdx = i; renderGroupedTasks();
    timerInterval = setInterval(() => {
      appData[currentKey].tasks[timerIdx].time = (appData[currentKey].tasks[timerIdx].time || 0) + 1;
      const display = $(`t-${timerIdx}`); if(display) display.textContent = format(appData[currentKey].tasks[timerIdx].time);
      updateTot(); if(appData[currentKey].tasks[timerIdx].time % 10 === 0) save();
    }, 1000);
  }
  function stopTimer() { clearInterval(timerInterval); timerInterval = null; timerIdx = -1; save(); renderGroupedTasks(); }
  function updateTot() { 
      const tasks = appData[currentKey]?.tasks || [];
      const tot = tasks.reduce((a, t) => a + (t.time || 0), 0); 
      if($('total-display')) $('total-display').textContent = format(tot); 
  }
  function save() { localStorage.setItem('studyPlannerData', JSON.stringify(appData)); localStorage.setItem('studyLectures', JSON.stringify(lectures)); localStorage.setItem('studyExams', JSON.stringify(exams)); }

  // 인강 진도표 관리
  function setLecTab(tab) {
      currentLecTab = tab; 
      if($('tab-ongoing')) $('tab-ongoing').classList.toggle('active', tab === 'ongoing'); 
      if($('tab-completed')) $('tab-completed').classList.toggle('active', tab === 'completed'); 
      renderLectures();
  }
  if($('add-lec-btn')) {
      $('add-lec-btn').onclick = () => {
        const cat = $('lec-category')?.value, name = $('lec-name')?.value, total = parseInt($('lec-count')?.value);
        if(name && total) { lectures.push({category: cat, name, total, done:0}); if($('lec-name')) $('lec-name').value=''; if($('lec-count')) $('lec-count').value=''; save(); renderLectures(); }
      };
  }
  function renderLectures() {
    const cont = $('lecture-list-container'); if(!cont) return;
    cont.innerHTML = '';
    const filteredLecs = lectures.filter(l => currentLecTab === 'ongoing' ? (l.done < l.total) : (l.done >= l.total));
    categories.forEach(cat => {
        const catLecs = filteredLecs.filter(l => l.category === cat);
        if(catLecs.length > 0) {
            const header = document.createElement('div'); header.style = "font-size:13px; font-weight:bold; color:var(--text-color); margin: 15px 0 8px; border-bottom:1px solid var(--border-color); padding-bottom:5px;"; header.innerText = `🏷️ ${cat}`; cont.appendChild(header);
            catLecs.forEach((l) => {
                const originalIdx = lectures.indexOf(l); const per = Math.round((l.done / l.total) * 100) || 0;
                const div = document.createElement('div'); div.className = 'card-style';
                div.innerHTML = `
                    <div style="display:flex;justify-content:space-between;margin-bottom:8px; align-items:center;">
                        <b style="font-size:15px;">${l.name}</b><span style="font-size:13px; font-weight:bold; color:var(--gray-text);">${l.done}/${l.total}강 (${per}%)</span>
                    </div>
                    <div style="background:var(--border-color);height:8px;border-radius:4px;overflow:hidden; margin-bottom:12px;">
                        <div style="background:var(--accent-color);width:${per}%;height:100%; transition: 0.3s;"></div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button style="padding:5px 10px; background:var(--bg-color); border:1px solid var(--border-color); border-radius:5px; cursor:pointer; color:var(--text-color);" onclick="updateLec(${originalIdx}, 1)">+1강</button>
                        <button style="padding:5px 10px; background:var(--bg-color); border:1px solid var(--border-color); border-radius:5px; cursor:pointer; color:var(--text-color);" onclick="updateLec(${originalIdx}, -1)">-1강</button>
                        <button style="margin-left:auto; padding:5px 10px; color:red; border:none; background:none; cursor:pointer; font-weight:bold;" onclick="delLec(${originalIdx})">삭제</button>
                    </div>`;
                cont.appendChild(div);
            });
        }
    });
    if(filteredLecs.length === 0) { cont.innerHTML = `<div style="text-align:center; padding:40px; color:var(--gray-text);">${currentLecTab === 'ongoing' ? '현재 수강 중인 강의가 없습니다.' : '아직 완료된 강의가 없습니다.'}</div>`; }
  }
  window.updateLec = (i, v) => { lectures[i].done = Math.max(0, Math.min(lectures[i].total, lectures[i].done + v)); save(); renderLectures(); };
  window.delLec = (i) => { if(confirm('이 인강을 목록에서 삭제할까요?')) { lectures.splice(i, 1); save(); renderLectures(); } };

  // 모의고사 성적 관리 (패인 분석)
  if($('add-exam-btn')) {
      $('add-exam-btn').onclick = () => {
        const ex = { 
            title: $('ex-title')?.value || getToday(), 
            korP: parseInt($('ex-kor-p')?.value)||0, mathP: parseInt($('ex-math-p')?.value)||0, engG: parseInt($('ex-eng-g')?.value)||0, 
            in1P: parseInt($('ex-in1-p')?.value)||0, in2P: parseInt($('ex-in2-p')?.value)||0,
            feedback: $('ex-feedback')?.value || ""
        };
        exams.push(ex); save(); renderExams();
        ['ex-title','ex-kor-s','ex-kor-p','ex-math-s','ex-math-p','ex-eng-g','ex-in1-s','ex-in1-p','ex-in2-s','ex-in2-p','ex-feedback'].forEach(id => {
            if($(id)) $(id).value = '';
        });
      };
  }

  function renderExams() {
    const cont = $('exam-list-container'); if(!cont) return;
    cont.innerHTML = '';
    [...exams].reverse().forEach((ex, index) => {
      const originalIdx = exams.length - 1 - index;
      const div = document.createElement('div'); div.className = 'card-style';
      const avg1 = ((ex.korP + ex.mathP + ex.in1P)/3).toFixed(1); const avg2 = ((ex.korP + ex.mathP + ex.in2P)/3).toFixed(1); const avg12 = ((ex.korP + ex.mathP + ex.in1P + ex.in2P)/4).toFixed(1);
      
      div.innerHTML = `
        <div style="display:flex; justify-content:space-between; margin-bottom:12px; align-items:center;">
          <b style="font-size:16px;">${ex.title}</b> 
          <button style="color:var(--gray-text); border:none; background:none; cursor:pointer; font-size:18px;" onclick="delExam(${originalIdx})">✕</button>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; text-align:center; margin-bottom:12px;">
          <div style="background:var(--bg-color); padding:8px; border-radius:6px; border:1px solid var(--border-color);"><div style="font-size:11px; color:var(--gray-text); margin-bottom:3px;">국수탐1</div><b style="font-size:15px;">${avg1}%</b></div>
          <div style="background:var(--bg-color); padding:8px; border-radius:6px; border:1px solid var(--border-color);"><div style="font-size:11px; color:var(--gray-text); margin-bottom:3px;">국수탐2</div><b style="font-size:15px;">${avg2}%</b></div>
          <div style="background:var(--bg-color); padding:8px; border-radius:6px; border:1px solid var(--blue-accent);"><div style="font-size:11px; color:var(--blue-accent); margin-bottom:3px; font-weight:bold;">국수탐탐</div><b style="font-size:15px; color:var(--blue-accent);">${avg12}%</b></div>
        </div>
        <div style="font-size:12px; color:var(--gray-text); display:flex; gap:10px; margin-bottom: 10px;">
          <span>국: ${ex.korP}</span><span>수: ${ex.mathP}</span><span>탐1: ${ex.in1P}</span><span>탐2: ${ex.in2P}</span><span style="margin-left:auto;">영어: <b style="color:var(--accent-color);">${ex.engG || '-'}등급</b></span>
        </div>
        ${ex.feedback ? `<div style="background: rgba(235, 87, 87, 0.05); border-left: 3px solid var(--accent-color); padding: 8px 10px; font-size: 13px; color: var(--text-color); border-radius: 4px;">🚨 <b>패인/피드백:</b> ${ex.feedback}</div>` : ''}
      `;
      cont.appendChild(div);
    });
    drawExamChart();
  }
  window.delExam = (i) => { if(confirm('이 모의고사 성적을 삭제할까요?')) { exams.splice(i, 1); save(); renderExams(); } };

  function drawExamChart() {
    const ctxEl = $('examChart'); if(!ctxEl) return;
    const ctx = ctxEl.getContext('2d'); const data = exams.map(ex => ((ex.korP + ex.mathP + ex.in1P + ex.in2P)/4).toFixed(1)); const labels = exams.map(e => e.title);
    if(examChart) examChart.destroy();
    examChart = new Chart(ctx, { type:'line', data:{ labels: labels, datasets:[{ label:'국수탐탐 평균', data: data, borderColor:'#4a90e2', backgroundColor: 'rgba(74, 144, 226, 0.1)', tension:0.3, fill:true }] }, options:{ scales:{ y:{min:0, max:100} }, plugins:{legend:{display:false}}, maintainAspectRatio: false } });
  }

  if($('backup-btn')) {
      $('backup-btn').onclick = () => { const dataStr = JSON.stringify({appData, lectures, exams}); const blob = new Blob([dataStr], {type: "application/json"}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `planner_backup_${getToday()}.json`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); alert('✅ 백업 완료!'); };
  }
  if($('restore-btn')) $('restore-btn').onclick = () => { if($('restore-file')) $('restore-file').click(); };
  if($('restore-file')) {
      $('restore-file').onchange = (e) => {
        const file = e.target.files[0]; if(!file) return; const reader = new FileReader();
        reader.onload = (re) => {
          try { const data = JSON.parse(re.target.result); if(data.appData !== undefined) { appData = data.appData || {}; lectures = data.lectures || []; exams = data.exams || []; save(); alert('✅ 복구 완료! 화면을 새로고침합니다.'); location.reload(); } else { alert('❌ 올바른 파일이 아닙니다.'); }
          } catch(err) { alert('❌ 파일 읽기 오류 발생.'); }
        }; reader.readAsText(file); e.target.value = ''; 
      };
  }

  // 차트 및 잔디
  function drawBalance() {
    const ctxEl = $('balanceChart'); if(!ctxEl) return;
    const ctx = ctxEl.getContext('2d'); const dataObj = {}; categories.forEach(c => dataObj[c] = 0);
    const tasks = appData[currentKey]?.tasks || [];
    tasks.forEach(t => { let found = false; categories.forEach(c => { if(c !== '기타' && t.fullText.includes(c)) { dataObj[c] += (t.time||0); found = true; } }); if(!found) dataObj['기타'] += (t.time||0); });
    if(balanceChart) balanceChart.destroy();
    balanceChart = new Chart(ctx, { type: 'doughnut', data: { labels: Object.keys(dataObj), datasets: [{ data: Object.values(dataObj), backgroundColor: ['#eb5757', '#4a90e2', '#27ae60', '#f2994a', '#8e44ad', '#bdc3c7'], borderWidth: 0 }] }, options: { maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 8, font: { size: 10 } } } } } });
  }
  function drawGrass() {
    const grid = $('grass-grid'); if(!grid) return; grid.innerHTML = '';
    for(let i=27; i>=0; i--) { const d = new Date(); d.setDate(d.getDate()-i); const k = d.toISOString().split('T')[0]; const sec = (appData[k] && appData[k].tasks) ? appData[k].tasks.reduce((a,t)=>a+(t.time||0),0) : 0; const hours = sec/3600; let level = hours > 9 ? 4 : hours > 6 ? 3 : hours > 3 ? 2 : hours > 0 ? 1 : 0; const div = document.createElement('div'); div.className = 'grass-square'; div.style.backgroundColor = `var(--grass-${level})`; grid.appendChild(div); }
  }
  function drawWeekly() {
    const ctxEl = $('weeklyChart'); if(!ctxEl) return;
    const ctx = ctxEl.getContext('2d'); const labels = [], data = [];
    for(let i=6; i>=0; i--) { const d = new Date(); d.setDate(d.getDate()-i); const k = d.toISOString().split('T')[0]; labels.push(k.slice(5)); const sec = (appData[k] && appData[k].tasks) ? appData[k].tasks.reduce((a,t)=>a+(t.time||0),0) : 0; data.push((sec/3600).toFixed(1)); }
    if(weeklyChart) weeklyChart.destroy();
    weeklyChart = new Chart(ctx, { type:'bar', data:{ labels, datasets:[{data, backgroundColor:'#eb5757', borderRadius:4}] }, options:{ maintainAspectRatio: false, plugins:{legend:{display:false}}, scales:{ y: { display: false } } } });
  }

  if($('theme-toggle')) {
      $('theme-toggle').onclick = () => { 
          if(document.body.getAttribute('data-theme') === 'dark') {
              document.body.removeAttribute('data-theme');
              $('theme-toggle').textContent = '🌙';
          } else {
              document.body.setAttribute('data-theme', 'dark');
              $('theme-toggle').textContent = '☀️';
          }
      };
  }

  // 실행
  init();
</script>
</body>
</html>
